<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Monitor</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; background:#0d1117; color:#c9d1d9; }
  header { padding:16px 20px; border-bottom:1px solid #21262d; display:flex; align-items:center; gap:12px; }
  header h1 { font-size:16px; margin:0; font-weight:600; color:#e6edf3; }
  #status { margin-left:auto; font-size:12px; color:#8b949e; }
  main { padding:16px 20px; display:grid; gap:10px; max-width:900px; }
  .card { border:1px solid #21262d; border-radius:8px; padding:12px 14px; display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center; background:#161b22; }
  .dot { width:10px; height:10px; border-radius:50%; background:#6e7681; }
  .idle .dot{background:#3fb950} .working .dot{background:#d29922} .waiting .dot{background:#f85149}
  .name { font-weight:600; color:#e6edf3; }
  .name .state { color:#8b949e; font-weight:400; }
  .sub { color:#8b949e; font-size:12px; margin-top:2px; word-break:break-all; }
  .meta { text-align:right; color:#8b949e; font-size:12px; white-space:nowrap; }
  .badge { display:inline-block; padding:1px 6px; border-radius:10px; background:#21262d; color:#8b949e; font-size:11px; margin-left:6px; }
  .empty { color:#6e7681; padding:32px; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>Claude Monitor</h1>
  <span id="status">connecting…</span>
</header>
<main id="list"></main>
<script>
const ORDER = { waiting: 0, working: 1, idle: 2 };
const esc = s => (s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
const ago = ms => {
  const s = Math.max(0, (Date.now() - ms) / 1000);
  if (s < 60) return Math.round(s) + 's';
  if (s < 3600) return Math.round(s / 60) + 'm';
  return Math.round(s / 3600) + 'h';
};
const label = i => i.title || i.zellij_session || (i.session_id || '').slice(0, 8) || 'instance';
const where = i => {
  const parts = [];
  if (i.zellij_session) parts.push('zellij: ' + esc(i.zellij_session) + (i.zellij_pane != null ? ':' + i.zellij_pane : ''));
  if (i.cwd) parts.push(esc(i.cwd));
  return parts.join('  ·  ');
};

function render(list) {
  const main = document.getElementById('list');
  if (!list.length) { main.innerHTML = '<div class="empty">No active instances</div>'; return; }
  main.innerHTML = list.map(i => {
    const cls = ['idle', 'working', 'waiting'].includes(i.status) ? i.status : '';
    const badges = [];
    if (i.model) badges.push('<span class="badge">' + esc(i.model) + '</span>');
    if (i.permission_mode && i.permission_mode !== 'default') badges.push('<span class="badge">' + esc(i.permission_mode) + '</span>');
    if (i.agent_type) badges.push('<span class="badge">' + esc(i.agent_type) + '</span>');
    return `<div class="card ${cls}">
      <div class="dot"></div>
      <div>
        <div class="name">${esc(label(i))} <span class="state">${esc(i.status)}</span>${badges.join('')}</div>
        <div class="sub">${where(i)}</div>
      </div>
      <div class="meta">${ago(i.updated_at)} ago</div>
    </div>`;
  }).join('');
}

async function tick() {
  const el = document.getElementById('status');
  try {
    const r = await fetch('state', { cache: 'no-store' });
    const d = await r.json();
    const list = (d.instances || []).slice().sort((a, b) =>
      (ORDER[a.status] ?? 9) - (ORDER[b.status] ?? 9) ||
      (a.zellij_session || '').localeCompare(b.zellij_session || ''));
    render(list);
    el.textContent = list.length + ' instance' + (list.length === 1 ? '' : 's') + ' · ' + new Date().toLocaleTimeString();
  } catch (e) {
    el.textContent = 'server unreachable';
  }
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
